name: Publish CLI

on:
  push:
    branches:
      - main
    paths:
      - "cli-go/**"
      - "cli-wrapper/**"
      - ".github/workflows/publish.yml"
      - "release.config.mjs"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Release CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: cli-go/go.sum

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install semantic-release dependencies
        run: |
          npm install --no-save semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/npm @semantic-release/git @semantic-release/exec conventional-changelog-conventionalcommits

      - name: Validate Homebrew formula-only release config
        shell: bash
        run: |
          set -euo pipefail
          if grep -q "^homebrew_casks:" cli-go/.goreleaser.yaml; then
            echo "homebrew_casks is not allowed. Envault ships Homebrew formula only."
            exit 1
          fi
          if grep -q "cli-cask-zips" cli-go/.goreleaser.yaml; then
            echo "cli-cask-zips archive is not allowed in formula-only mode."
            exit 1
          fi

      - name: Ensure CLI changes exist since last tag
        id: cli_scope
        shell: bash
        run: |
          set -euo pipefail
          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [ -z "${LAST_TAG}" ]; then
            echo "No previous CLI tag found; allowing initial CLI release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CLI_FILES="$(git diff --name-only "${LAST_TAG}..HEAD" -- 'cli-go/**' 'cli-wrapper/**')"
          if [ -z "${CLI_FILES}" ]; then
            echo "No CLI file changes detected since ${LAST_TAG}; skipping CLI auto-release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "CLI changes detected since ${LAST_TAG}; proceeding with CLI auto-release."
          printf '%s\n' "${CLI_FILES}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Semantic Release (CLI only)
        if: steps.cli_scope.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          npx semantic-release
