name: Publish MCP Server

on:
  push:
    branches:
      - main
    paths:
      - "mcp-server/**"
      - ".github/workflows/publish-mcp.yml"
      - "release.mcp.config.js"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish:
    name: Publish MCP to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install semantic-release dependencies
        run: |
          npm install --no-save semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/npm @semantic-release/git @semantic-release/exec conventional-changelog-conventionalcommits

      - name: Verify npm auth prerequisites
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PKG="@dinanathdash/envault-mcp-server"

          if npm view "${PKG}" version >/dev/null 2>&1; then
            echo "${PKG} already exists on npm. Trusted publishing can be used if configured."
            exit 0
          fi

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::${PKG} is not yet on npm. First publish requires NPM_TOKEN secret (automation token with publish rights)."
            exit 1
          fi

          echo "${PKG} not found on npm; NPM_TOKEN fallback is present for first publish."

      - name: Semantic Release (MCP)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release --extends ./release.mcp.config.js
