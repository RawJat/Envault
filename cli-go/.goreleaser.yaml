version: 2

project_name: envault

before:
  hooks:
    - go mod tidy

builds:
  - id: envault
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/DinanathDash/Envault/cli-go/cmd.version={{.Version}}
      - -X github.com/DinanathDash/Envault/cli-go/cmd.commit={{.Commit}}
      - -X github.com/DinanathDash/Envault/cli-go/cmd.date={{.Date}}

archives:
  - id: cli-tarballs
    ids:
      - envault
    formats:
      - tar.gz
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows
    format_overrides:
      - goos: windows
        formats:
          - zip
  - id: cli-cask-zips
    ids:
      - envault
    formats:
      - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    include:
      - '^feat(\([^)]+\))?:'
      - '^fix(\([^)]+\))?:'
      - '^perf(\([^)]+\))?:'
      - '^refactor(\([^)]+\))?:'
      - '^build(\([^)]+\))?:'
      - '^chore(\([^)]+\))?:'
    exclude:
      - '^chore\(cli-release\):'
      - '^chore\(release\):'
      - '^docs:'
      - '^test:'

# Homebrew formula configuration
brews:
  - repository:
      owner: DinanathDash
      name: homebrew-envault
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    name: envault
    homepage: "https://envault.tech"
    description: "Envault CLI - Securely manage your environment variables"
    license: "Apache-2.0"
    ids:
      - cli-tarballs
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    install: |
      bin.install "envault"
    test: |
      system "#{bin}/envault", "--version"

# Homebrew cask configuration
homebrew_casks:
  - repository:
      owner: DinanathDash
      name: homebrew-envault
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    name: envault
    homepage: "https://envault.tech"
    description: "Envault CLI - Securely manage your environment variables"
    ids:
      - cli-cask-zips
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    binary: envault
    url:
      verified: github.com/DinanathDash/Envault
