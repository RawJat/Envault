version: 2

project_name: envault

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/DinanathDash/Envault/cli-go/cmd.version={{.Version}}
      - -X github.com/DinanathDash/Envault/cli-go/cmd.commit={{.Commit}}
      - -X github.com/DinanathDash/Envault/cli-go/cmd.date={{.Date}}

archives:
  - formats:
      - tar.gz
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    include:
      - '^feat(\([^)]+\))?:'
      - '^fix(\([^)]+\))?:'
      - '^perf(\([^)]+\))?:'
      - '^refactor(\([^)]+\))?:'
      - '^build(\([^)]+\))?:'
      - '^chore(\([^)]+\))?:'
    exclude:
      - '^chore\(cli-release\):'
      - '^chore\(release\):'
      - '^docs:'
      - '^test:'

# Homebrew cask configuration
homebrew_casks:
  - repository:
      owner: DinanathDash
      name: homebrew-envault
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    name: envault
    homepage: "https://envault.tech"
    description: "Envault CLI - Securely manage your environment variables"
    url:
      verified: github.com/DinanathDash/Envault
